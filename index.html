<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Laporan Teknisi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

  <!-- LOGIN -->
  <div id="loginBox" class="card shadow-sm mx-auto" style="max-width:400px;">
    <div class="card-body">
      <h5 class="text-center mb-3">🔐 Login Teknisi</h5>

      <input id="loginNama" class="form-control mb-2" placeholder="Nama">
      <input id="loginPin" type="password" class="form-control mb-3" placeholder="PIN">

      <button class="btn btn-primary w-100" onclick="login()">Masuk</button>
    </div>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">📋 Laporan Teknisi</h5>
      <div>
        <span id="roleBadge" class="badge bg-secondary me-2"></span>
        <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="row text-center mb-3">
      <div class="col">
        <div class="card shadow-sm">
          <div class="card-body">
            <small>Total</small>
            <h5 id="total">0</h5>
          </div>
        </div>
      </div>
      <div class="col">
        <div class="card shadow-sm">
          <div class="card-body">
            <small>Selesai</small>
            <h5 id="selesai">0</h5>
          </div>
        </div>
      </div>
      <div class="col">
        <div class="card shadow-sm">
          <div class="card-body">
            <small>Pending</small>
            <h5 id="pending">0</h5>
          </div>
        </div>
      </div>
    </div>

    <!-- FORM -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">

        <div class="mb-2">
          <label class="form-label">Nama Teknisi</label>
          <input id="nama" class="form-control" readonly>
        </div>

        <div class="mb-2">
          <label class="form-label">Tanggal & Jam</label>
          <input type="datetime-local" id="tanggal" class="form-control">
        </div>

        <div class="mb-2">
          <label class="form-label">Lokasi</label>
          <input id="lokasi" class="form-control">
        </div>

        <div class="mb-2">
          <label class="form-label">Pekerjaan</label>
          <select id="pekerjaan" class="form-select">
            <option value="">Pilih</option>
            <option>AC</option>
            <option>Listrik</option>
            <option>Air</option>
            <option>Cleaning</option>
          </select>
        </div>

        <div class="mb-2">
          <label class="form-label">Deskripsi</label>
          <textarea id="deskripsi" class="form-control"></textarea>
        </div>

        <div class="mb-2">
          <label class="form-label">Status</label>
          <select id="status" class="form-select">
            <option>Selesai</option>
            <option>Pending</option>
          </select>
        </div>

        <!-- FOTO -->
        <div class="mb-2">
          <label class="form-label">Foto</label>
          <input type="file" id="foto" class="form-control" accept="image/*" onchange="previewFoto(event)">
        </div>

        <img id="preview" class="img-fluid rounded mt-2 mb-2" style="display:none; max-height:150px;">

        <button class="btn btn-primary w-100" onclick="kirim(event)">
          🚀 Kirim Laporan
        </button>

      </div>
    </div>

    <!-- RIWAYAT -->
    <div class="d-flex justify-content-between align-items-center mb-2">
      <h6 class="mb-0">📊 Riwayat Laporan</h6>
      <button class="btn btn-sm btn-outline-secondary" onclick="loadData()">Refresh</button>
    </div>

    <div id="list" class="row g-3"></div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
