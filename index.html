<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Laporan Teknisi</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body { font-size: 14px; }
  img { object-fit: cover; }
</style>
</head>

<body class="bg-light">

<div class="container py-3">

<h4 class="mb-3">📋 Laporan Teknisi</h4>

<!-- ================= LOGIN ================= -->
<div id="loginBox" class="card p-3 shadow-sm">
  <input id="nama" class="form-control mb-2" placeholder="Nama">
  <input id="pin" type="password" class="form-control mb-2" placeholder="PIN">
  <button onclick="login()" class="btn btn-primary w-100">Login</button>
</div>

<!-- ================= APP ================= -->
<div id="appBox" style="display:none;">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-3">
  <div><b id="userInfo"></b></div>
  <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
</div>

<!-- ================= FORM ================= -->
<div class="card mb-3 shadow-sm">
<div class="card-body">

<input id="tanggal" class="form-control mb-2" readonly>

<input id="lokasi" class="form-control mb-2" placeholder="Lokasi">
<input id="pekerjaan" class="form-control mb-2" placeholder="Pekerjaan">

<select id="status" class="form-control mb-2">
<option value="Selesai">Selesai</option>
<option value="Pending">Pending</option>
</select>

<textarea id="deskripsi" class="form-control mb-2" placeholder="Deskripsi"></textarea>

<!-- FOTO -->
<input type="file" id="foto" class="form-control mb-2" accept="image/*" capture="environment">

<!-- PREVIEW -->
<img id="previewImg"
     class="img-fluid rounded mb-2 border"
     style="max-height:150px; display:none;">

<button onclick="simpan()" class="btn btn-success w-100">💾 Simpan</button>

</div>
</div>

<button onclick="loadData()" class="btn btn-secondary mb-3 w-100">🔄 Refresh</button>

<!-- ================= LIST ================= -->
<div id="listData"></div>

</div>
</div>

<!-- ================= MODAL FOTO ================= -->
<div class="modal fade" id="imgModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content bg-dark border-0">
<div class="modal-body text-center p-2">
<img id="modalImg" class="img-fluid rounded">
</div>
</div>
</div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
