<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Laporan Teknisi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

  <!-- LOGIN -->
  <div id="loginBox" class="card shadow-sm">
    <div class="card-body">
      <h5 class="mb-3">🔐 Login Teknisi</h5>
      <input id="loginNama" class="form-control mb-3" placeholder="Masukkan nama teknisi">
      <button class="btn btn-primary w-100" onclick="login()">Masuk</button>
    </div>
  </div>

  <!-- APP -->
  <div id="appBox" style="display:none;">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5>📋 Laporan Teknisi</h5>
      <button class="btn btn-sm btn-danger" onclick="logout()">Logout</button>
    </div>

    <div class="card shadow-sm mb-4">
      <div class="card-body">

        <input id="nama" class="form-control mb-2" readonly>

        <label class="form-label">Tanggal & Jam</label>
        <input type="datetime-local" id="tanggal" class="form-control mb-2">

        <input id="lokasi" class="form-control mb-2" placeholder="Lokasi">

        <select id="pekerjaan" class="form-select mb-2">
          <option value="">Pilih pekerjaan</option>
          <option>AC</option>
          <option>Listrik</option>
          <option>Air</option>
          <option>Cleaning</option>
        </select>

        <textarea id="deskripsi" class="form-control mb-2" placeholder="Deskripsi"></textarea>

        <select id="status" class="form-select mb-3">
          <option>Selesai</option>
          <option>Pending</option>
        </select>

        <button class="btn btn-primary w-100" onclick="kirim(event)">
          🚀 Kirim Laporan
        </button>

      </div>
    </div>

    <h6>📊 Riwayat</h6>
    <div id="list" class="row g-2"></div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
