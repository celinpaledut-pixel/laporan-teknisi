<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Laporan Teknisi</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-3">

<h4>Laporan Teknisi</h4>

<!-- LOGIN -->
<div id="loginBox">
  <input id="nama" class="form-control mb-2" placeholder="Nama">
  <input id="pin" type="password" class="form-control mb-2" placeholder="PIN">
  <button onclick="login()" class="btn btn-primary w-100">Login</button>
</div>

<!-- APP -->
<div id="appBox" style="display:none;">

<!-- HEADER USER -->
<div class="d-flex justify-content-between align-items-center mb-3">
  <div>
    <b id="userInfo"></b>
  </div>
  <button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
</div>

<!-- FORM -->
<div class="card mb-3">
<div class="card-body">

<input id="tanggal" class="form-control mb-2">
<input id="lokasi" class="form-control mb-2" placeholder="Lokasi">
<input id="pekerjaan" class="form-control mb-2" placeholder="Pekerjaan">

<select id="status" class="form-control mb-2">
<option>Selesai</option>
<option>Pending</option>
</select>

<textarea id="deskripsi" class="form-control mb-2" placeholder="Deskripsi"></textarea>

<input type="file" id="foto" class="form-control mb-2" accept="image/*">

<button onclick="simpan()" class="btn btn-success w-100">Simpan</button>

</div>
</div>

<button onclick="loadData()" class="btn btn-secondary mb-3">Refresh</button>

<div id="listData"></div>

</div>
</div>

<!-- MODAL FOTO -->
<div class="modal fade" id="imgModal">
<div class="modal-dialog modal-lg modal-dialog-centered">
<div class="modal-content bg-dark">
<div class="modal-body text-center">
<img id="modalImg" class="img-fluid">
</div>
</div>
</div>
</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
